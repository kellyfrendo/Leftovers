<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Leftovers" />
    <meta name="theme-color" content="#2b6cb0" />
    <title>Leftovers — Fridge Tracker</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header__brand">
          <span class="header__icon" aria-hidden="true">🧊</span>
          <div>
            <h1>Leftovers</h1>
            <p class="header__tagline">Know what's in your fridge and when to eat it</p>
          </div>
        </div>
        <div class="header__stats" id="stats" aria-live="polite"></div>
      </header>

      <main class="main">
        <section class="panel panel--form" aria-labelledby="add-heading">
          <h2 id="add-heading">Add to fridge</h2>
          <form id="add-form" class="form">
            <div class="form__row">
              <label class="field">
                <span class="field__label">Date added</span>
                <input type="date" id="date" name="date" required />
              </label>
              <label class="field">
                <span class="field__label">Category</span>
                <select id="category" name="category" required>
                  <option value="cooked-meal">Cooked meal</option>
                  <option value="meat-poultry">Meat & poultry</option>
                  <option value="soup-stew">Soup & stew</option>
                  <option value="vegetables">Vegetables</option>
                  <option value="dairy">Dairy</option>
                  <option value="seafood">Seafood</option>
                  <option value="other">Other</option>
                </select>
              </label>
            </div>

            <label class="field">
              <span class="field__label">Description</span>
              <input
                type="text"
                id="description"
                name="description"
                placeholder="e.g. Chicken stir-fry, leftover pasta"
                required
                maxlength="120"
              />
            </label>

            <div class="form__row">
              <label class="field">
                <span class="field__label">Container</span>
                <select id="container" name="container" required>
                  <option value="Glass jar">Glass jar</option>
                  <option value="Square tub">Square tub</option>
                  <option value="Glass container">Glass container</option>
                  <option value="Other">Other</option>
                </select>
              </label>
              <label class="field">
                <span class="field__label">Location</span>
                <select id="location" name="location" required>
                  <option value="Top shelf">Top shelf</option>
                  <option value="Middle shelf">Middle shelf</option>
                  <option value="Bottom shelf">Bottom shelf</option>
                  <option value="Fiambre drawer">Fiambre drawer</option>
                  <option value="Left drawer">Left drawer</option>
                  <option value="Right drawer">Right drawer</option>
                  <option value="Door">Door</option>
                </select>
              </label>
            </div>

            <p class="form__hint" id="eat-by-preview"></p>

            <button type="submit" class="btn btn--primary">Add to fridge</button>
          </form>
        </section>

        <section class="panel panel--list" aria-labelledby="fridge-heading">
          <div class="panel__toolbar">
            <h2 id="fridge-heading">In the fridge</h2>
            <div class="filters" role="group" aria-label="Filter leftovers">
              <button type="button" class="filter-btn filter-btn--active" data-filter="all">
                All
              </button>
              <button type="button" class="filter-btn" data-filter="fresh">Fresh</button>
              <button type="button" class="filter-btn" data-filter="soon">Use soon</button>
              <button type="button" class="filter-btn" data-filter="overdue">Overdue</button>
            </div>
          </div>

          <div id="empty-state" class="empty-state hidden">
            <p class="empty-state__icon" aria-hidden="true">🥡</p>
            <p class="empty-state__title">Your fridge is empty</p>
            <p class="empty-state__text">Add your first leftover above to start tracking.</p>
          </div>

          <ul id="leftover-list" class="leftover-list" aria-live="polite"></ul>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
